name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - run: cargo build --release --locked --bin sentinel --target ${{ matrix.target }}
      - name: Package binary
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $version = "${{ github.ref_name }}"
          $package = "sentinel-$version-$target"
          $root = Join-Path "dist" $package
          New-Item -ItemType Directory -Force -Path $root | Out-Null

          $binary = if ($IsWindows) { "sentinel.exe" } else { "sentinel" }
          Copy-Item "target/$target/release/$binary" "$root/$binary"
          Copy-Item "README.md" "$root/README.md"
          Copy-Item "LICENSE" "$root/LICENSE"

          if ("${{ matrix.archive }}" -eq "zip") {
            $asset = "dist/$package.zip"
            Compress-Archive -Path "$root/*" -DestinationPath $asset -Force
          } else {
            $asset = "dist/$package.tar.gz"
            tar -C dist -czf $asset $package
          }

          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          $assetName = Split-Path $asset -Leaf
          "$hash  $assetName" | Out-File "$asset.sha256" -Encoding ascii -NoNewline
      - uses: actions/upload-artifact@v4
        with:
          name: sentinel-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
