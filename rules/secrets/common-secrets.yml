version: 1
id: SECRET-RULE-001
name: Secret in environment file
category: secret_leakage
severity: high
confidence: medium
description: Detects sensitive variable names in environment-style files.
recommendation: Keep environment files out of source control and load secrets from a managed secret store.
tags:
  - secrets
  - configuration
match:
  regex:
    - '(?i)\b(api[_-]?key|client[_-]?secret|jwt[_-]?secret|database[_-]?url)\s*='
  path_contains:
    - .env
    - secrets
